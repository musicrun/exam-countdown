<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>G11 Exam Countdown</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300..700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root,[data-theme="light"]{
  --color-bg:#f7f6f2;
  --color-surface:#f9f8f5;
  --color-surface-2:#fbfbf9;
  --color-surface-offset:#f0ede8;
  --color-border:#d4d1ca;
  --color-divider:#dcd9d5;
  --color-text:#28251d;
  --color-text-muted:#7a7974;
  --color-text-faint:#bab9b4;
  --color-primary:#01696f;
  --color-primary-highlight:#cedcd8;
  --color-warning:#964219;
  --color-error:#a12c7b;
  --color-success:#437a22;
  --color-orange:#da7101;
  --color-gold:#d19900;
  --shadow-sm:0 1px 2px oklch(0.2 0.01 80/0.06);
  --shadow-md:0 4px 12px oklch(0.2 0.01 80/0.08);
  --shadow-lg:0 12px 32px oklch(0.2 0.01 80/0.12);
  --radius-sm:0.375rem;
  --radius-md:0.5rem;
  --radius-lg:0.75rem;
  --radius-xl:1rem;
  --radius-full:9999px;
  --font-body:'Space Grotesk',sans-serif;
  --font-mono:'Space Mono',monospace;
  --text-xs:clamp(0.75rem,0.7rem+0.25vw,0.875rem);
  --text-sm:clamp(0.875rem,0.8rem+0.35vw,1rem);
  --text-base:clamp(1rem,0.95rem+0.25vw,1.125rem);
  --text-lg:clamp(1.125rem,1rem+0.75vw,1.5rem);
  --text-xl:clamp(1.5rem,1.2rem+1.25vw,2.25rem);
  --text-2xl:clamp(2rem,1.2rem+2.5vw,3.5rem);
  --space-1:0.25rem;--space-2:0.5rem;--space-3:0.75rem;--space-4:1rem;
  --space-5:1.25rem;--space-6:1.5rem;--space-8:2rem;--space-10:2.5rem;
  --space-12:3rem;--space-16:4rem;
  --transition:180ms cubic-bezier(0.16,1,0.3,1);
}

[data-theme="dark"]{
  --color-bg:#0f0e0c;
  --color-surface:#161512;
  --color-surface-2:#1c1b18;
  --color-surface-offset:#222120;
  --color-border:#323130;
  --color-divider:#242321;
  --color-text:#d4d3d0;
  --color-text-muted:#797876;
  --color-text-faint:#4a4947;
  --color-primary:#4f98a3;
  --color-primary-highlight:#1e3030;
  --color-warning:#e07a42;
  --color-error:#d163a7;
  --color-success:#6daa45;
  --color-orange:#fdab43;
  --color-gold:#e8af34;
  --shadow-sm:0 1px 2px oklch(0 0 0/0.3);
  --shadow-md:0 4px 12px oklch(0 0 0/0.4);
  --shadow-lg:0 12px 32px oklch(0 0 0/0.5);
}

html{-webkit-font-smoothing:antialiased;scroll-behavior:smooth;}
body{
  min-height:100dvh;
  font-family:var(--font-body);
  font-size:var(--text-base);
  color:var(--color-text);
  background:var(--color-bg);
  line-height:1.6;
}

header{
  position:sticky;top:0;z-index:100;
  background:oklch(from var(--color-bg) l c h/0.85);
  backdrop-filter:blur(12px);
  -webkit-backdrop-filter:blur(12px);
  border-bottom:1px solid var(--color-border);
  padding:var(--space-4) var(--space-6);
  display:flex;align-items:center;justify-content:space-between;
}
.logo{
  display:flex;align-items:center;gap:var(--space-3);
  font-size:var(--text-lg);font-weight:700;letter-spacing:-0.02em;
}
.logo svg{color:var(--color-primary);}
.header-right{display:flex;align-items:center;gap:var(--space-4);}
#live-clock{
  font-family:var(--font-mono);font-size:var(--text-sm);
  color:var(--color-text-muted);letter-spacing:0.04em;
}
.theme-toggle{
  width:36px;height:36px;border-radius:var(--radius-full);
  display:flex;align-items:center;justify-content:center;
  color:var(--color-text-muted);
  transition:color var(--transition),background var(--transition);
  cursor:pointer;border:1px solid var(--color-border);
  background:var(--color-surface);
}
.theme-toggle:hover{color:var(--color-text);background:var(--color-surface-offset);}

.hero{
  text-align:center;padding:var(--space-12) var(--space-6) var(--space-8);
  max-width:800px;margin:0 auto;
}
.hero h1{
  font-size:var(--text-2xl);font-weight:700;
  letter-spacing:-0.03em;line-height:1.1;
  margin-bottom:var(--space-3);
}
.hero p{color:var(--color-text-muted);font-size:var(--text-base);}
.next-badge{
  display:inline-flex;align-items:center;gap:var(--space-2);
  background:var(--color-primary-highlight);
  color:var(--color-primary);
  font-size:var(--text-xs);font-weight:600;
  padding:var(--space-1) var(--space-3);
  border-radius:var(--radius-full);
  margin-bottom:var(--space-4);
  letter-spacing:0.04em;text-transform:uppercase;
}
.pulse{width:6px;height:6px;border-radius:50%;background:var(--color-primary);animation:pulse 2s ease-in-out infinite;}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1);}50%{opacity:0.5;transform:scale(1.4);}}

.exams-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(min(340px,100%),1fr));
  gap:var(--space-5);
  max-width:1200px;margin:0 auto;
  padding:0 var(--space-6) var(--space-12);
}

.exam-card{
  background:var(--color-surface);
  border:1px solid var(--color-border);
  border-radius:var(--radius-xl);
  padding:var(--space-5);
  box-shadow:var(--shadow-sm);
  transition:transform var(--transition),box-shadow var(--transition),border-color var(--transition);
  position:relative;overflow:hidden;
}
.exam-card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:3px;
  background:var(--card-accent,var(--color-primary));
  border-radius:var(--radius-xl) var(--radius-xl) 0 0;
  opacity:0.8;
}
.exam-card:hover{transform:translateY(-2px);box-shadow:var(--shadow-md);border-color:var(--card-accent,var(--color-primary));}
.exam-card.past{opacity:0.45;}
.exam-card.next-up{
  border-color:var(--card-accent,var(--color-primary));
  box-shadow:0 0 0 1px var(--card-accent,var(--color-primary)),var(--shadow-md);
}

.card-header{
  display:flex;align-items:flex-start;justify-content:space-between;
  gap:var(--space-3);margin-bottom:var(--space-4);
}
.subject-name{
  font-size:var(--text-lg);font-weight:700;letter-spacing:-0.02em;
  line-height:1.2;flex:1;
}
.session-badge{
  flex-shrink:0;
  font-size:var(--text-xs);font-weight:600;
  padding:2px var(--space-2);
  border-radius:var(--radius-full);
  letter-spacing:0.04em;text-transform:uppercase;
  display:flex;align-items:center;gap:4px;
}
.session-morning{background:oklch(from var(--color-gold) l c h/0.15);color:var(--color-gold);}
.session-afternoon{background:oklch(from var(--color-orange) l c h/0.15);color:var(--color-orange);}

.exam-date{
  display:flex;align-items:center;gap:var(--space-2);
  color:var(--color-text-muted);font-size:var(--text-sm);
  margin-bottom:var(--space-4);
}
.exam-date svg{color:var(--color-text-faint);flex-shrink:0;}

.ticker{
  background:var(--color-surface-2);
  border:1px solid var(--color-divider);
  border-radius:var(--radius-lg);
  padding:var(--space-3) var(--space-4);
}
.ticker-label{
  font-size:var(--text-xs);font-weight:600;text-transform:uppercase;
  letter-spacing:0.08em;color:var(--color-text-faint);
  margin-bottom:var(--space-2);
}
.ticker-time{
  display:flex;align-items:baseline;gap:var(--space-2);
  flex-wrap:wrap;
}
.ticker-time .unit{
  display:flex;flex-direction:column;align-items:center;
  min-width:52px;
}
.ticker-time .num{
  font-family:var(--font-mono);font-size:var(--text-xl);
  font-weight:700;letter-spacing:-0.02em;
  color:var(--card-accent,var(--color-primary));
  line-height:1;
  transition:transform 0.15s ease,opacity 0.15s ease;
}
.ticker-time .num.flip{transform:translateY(-4px);opacity:0;}
.ticker-time .lbl{
  font-size:var(--text-xs);color:var(--color-text-faint);
  letter-spacing:0.06em;text-transform:uppercase;margin-top:2px;
}
.ticker-sep{
  font-family:var(--font-mono);font-size:var(--text-lg);
  color:var(--color-text-faint);align-self:flex-start;
  margin-top:2px;
}
.past-label{
  font-family:var(--font-mono);font-size:var(--text-sm);
  color:var(--color-text-faint);font-weight:700;text-transform:uppercase;
  letter-spacing:0.1em;
}

.break-banner{
  grid-column:1/-1;
  background:oklch(from var(--color-success) l c h/0.06);
  border:1px dashed oklch(from var(--color-success) l c h/0.35);
  border-radius:var(--radius-xl);
  padding:var(--space-6);
  text-align:center;
}
.break-banner h3{font-size:var(--text-lg);font-weight:700;color:var(--color-success);margin-bottom:var(--space-2);}
.break-banner p{color:var(--color-text-muted);font-size:var(--text-sm);}

.filter-bar{
  display:flex;align-items:center;gap:var(--space-3);
  max-width:1200px;margin:0 auto var(--space-6);
  padding:0 var(--space-6);flex-wrap:wrap;
}
.filter-btn{
  font-size:var(--text-sm);font-weight:500;
  padding:var(--space-2) var(--space-4);
  border-radius:var(--radius-full);
  border:1px solid var(--color-border);
  background:var(--color-surface);
  color:var(--color-text-muted);
  cursor:pointer;
  transition:all var(--transition);
}
.filter-btn:hover{border-color:var(--color-primary);color:var(--color-primary);}
.filter-btn.active{
  background:var(--color-primary);color:#fff;border-color:var(--color-primary);
}

.progress-section{
  max-width:1200px;margin:0 auto var(--space-8);padding:0 var(--space-6);
}
.progress-label{
  display:flex;justify-content:space-between;
  font-size:var(--text-sm);color:var(--color-text-muted);margin-bottom:var(--space-2);
}
.progress-bar{height:6px;background:var(--color-divider);border-radius:var(--radius-full);overflow:hidden;}
.progress-fill{
  height:100%;background:var(--color-primary);border-radius:var(--radius-full);
  transition:width 1s ease;
}

@media(max-width:600px){
  header{padding:var(--space-3) var(--space-4);}
  .hero{padding:var(--space-8) var(--space-4) var(--space-6);}
  .exams-grid{padding:0 var(--space-4) var(--space-8);gap:var(--space-4);}
  .filter-bar{padding:0 var(--space-4);}
  .progress-section{padding:0 var(--space-4);}
  #live-clock{display:none;}
}
</style>
</head>
<body>

<header>
  <div class="logo">
    <svg width="28" height="28" viewBox="0 0 28 28" fill="none" aria-label="G11 Exam Countdown">
      <rect x="4" y="4" width="20" height="20" rx="5" stroke="currentColor" stroke-width="2"/>
      <path d="M9 14h10M9 10h6M9 18h4" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      <circle cx="21" cy="7" r="4" fill="var(--color-bg)" stroke="currentColor" stroke-width="1.5"/>
      <path d="M21 5.5v2l1 1" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    G11 Exam Countdown
  </div>
  <div class="header-right">
    <span id="live-clock">--:--:--</span>
    <button class="theme-toggle" data-theme-toggle aria-label="Toggle theme">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
      </svg>
    </button>
  </div>
</header>

<div class="hero">
  <div class="next-badge"><span class="pulse"></span><span id="next-label">Loading…</span></div>
  <h1>G11 End of Year Exams</h1>
  <p>Tentative schedule — May 3rd version. Real-time countdowns to every paper.</p>
</div>

<div class="progress-section">
  <div class="progress-label">
    <span>Overall exam progress</span>
    <span id="progress-text">0 / 0 completed</span>
  </div>
  <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
</div>

<div class="filter-bar">
  <button class="filter-btn active" data-filter="all">All</button>
  <button class="filter-btn" data-filter="upcoming">Upcoming</button>
  <button class="filter-btn" data-filter="past">Past</button>
</div>

<div class="exams-grid" id="exams-grid"></div>

<script>
const EXAMS = [
  // Sun 31-May
  { id:1,  subject:'Math AA/AI HL', paper:'P1',              session:'Morning',   date:'2026-05-31', color:'#4f98a3' },
  { id:2,  subject:'Arabic A HL/SL',paper:'P1',              session:'Afternoon', date:'2026-05-31', color:'#e8af34' },
  // Mon 1-Jun
  { id:3,  subject:'Math AA/AI HL', paper:'P2',              session:'Morning',   date:'2026-06-01', color:'#4f98a3' },
  // Mon 1-Jun afternoon — empty per schedule
  // Tue 2-Jun
  { id:4,  subject:'Arabic A HL/SL',paper:'P2',              session:'Morning',   date:'2026-06-02', color:'#e8af34' },
  { id:5,  subject:'BM HL',         paper:'P3',              session:'Afternoon', date:'2026-06-02', color:'#a86fdf' },
  // Wed 3-Jun
  { id:6,  subject:'BM HL/SL',      paper:'P2',              session:'Morning',   date:'2026-06-03', color:'#a86fdf' },
  { id:7,  subject:'Physics HL/SL', paper:'P1',              session:'Afternoon', date:'2026-06-03', color:'#d163a7' },
  // Thu 4-Jun
  { id:8,  subject:'Physics HL/SL', paper:'P2',              session:'Morning',   date:'2026-06-04', color:'#d163a7' },
  { id:9,  subject:'Psychology HL/SL',paper:'P2',            session:'Afternoon', date:'2026-06-04', color:'#5591c7' },
  // Sun 7-Jun
  { id:10, subject:'Spanish B',     paper:'Listening',       session:'Morning',   date:'2026-06-07', color:'#fdab43' },
  { id:11, subject:'CS HL/SL',      paper:'P1',              session:'Afternoon', date:'2026-06-07', color:'#6daa45' },
  { id:12, subject:'ESS SL',        paper:'P1',              session:'Afternoon', date:'2026-06-07', color:'#4f98a3' },
  // Mon 8-Jun
  { id:13, subject:'CS HL/SL',      paper:'P2',              session:'Morning',   date:'2026-06-08', color:'#6daa45' },
  { id:14, subject:'ESS SL',        paper:'P2',              session:'Morning',   date:'2026-06-08', color:'#4f98a3' },
  { id:15, subject:'Arabic B HL/SL',paper:'P1+P2 Reading',   session:'Afternoon', date:'2026-06-08', color:'#e8af34' },
  { id:16, subject:'Spanish B',     paper:'P1+P2 Reading',   session:'Afternoon', date:'2026-06-08', color:'#fdab43' },
  // Tue 9-Jun
  { id:17, subject:'Chem HL/SL',    paper:'P1',              session:'Morning',   date:'2026-06-09', color:'#dd6974' },
  { id:18, subject:'DT HL/SL',      paper:'P1',              session:'Morning',   date:'2026-06-09', color:'#bb653b' },
  { id:19, subject:'Chem HL/SL',    paper:'P2',              session:'Afternoon', date:'2026-06-09', color:'#dd6974' },
  { id:20, subject:'DT HL/SL',      paper:'P2',              session:'Afternoon', date:'2026-06-09', color:'#bb653b' },
  // Wed 10-Jun
  { id:21, subject:'English A HL/SL',paper:'P1',             session:'Morning',   date:'2026-06-10', color:'#a86fdf' },
  { id:22, subject:'English B HL/SL',paper:'P1+P2 Reading',  session:'Morning',   date:'2026-06-10', color:'#7a39bb' },
  { id:23, subject:'English A HL/SL',paper:'P2',             session:'Afternoon', date:'2026-06-10', color:'#a86fdf' },
  { id:24, subject:'English B HL/SL',paper:'P1+P2 Listening',session:'Afternoon', date:'2026-06-10', color:'#7a39bb' },
  // Thu 11-Jun
  { id:25, subject:'Biology HL/SL', paper:'P1',              session:'Morning',   date:'2026-06-11', color:'#6daa45' },
  { id:26, subject:'Biology HL/SL', paper:'P2',              session:'Afternoon', date:'2026-06-11', color:'#6daa45' },
  // Sun 14-Jun
  { id:27, subject:'Economics HL',  paper:'P3',              session:'Morning',   date:'2026-06-14', color:'#fdab43' },
  { id:28, subject:'Economics HL/SL',paper:'P2',             session:'Afternoon', date:'2026-06-14', color:'#fdab43' },
  // Mon 15-Jun
  { id:29, subject:'GP HL/SL',      paper:'P1+P2',           session:'Morning',   date:'2026-06-15', color:'#5591c7' },
  { id:30, subject:'GP HL/SL',      paper:'P3',              session:'Afternoon', date:'2026-06-15', color:'#5591c7' },
];

// Breaks: after Jun 4 (Fri 5 - Sat 6 weekend gap implied), after Jun 11 (Fri 12 - Sat 13)
const BREAKS = [
  { afterDate:'2026-06-04', label:'Weekend Break: Fri 5 – Sat 6 Jun', desc:'A short breather before the week 2 push.' },
  { afterDate:'2026-06-11', label:'Weekend Break: Fri 12 – Sat 13 Jun', desc:'Last break before the final stretch.' },
];

const SESSION_TIMES = { Morning: 8, Afternoon: 13 };

function getExamDateTime(exam) {
  const d = new Date(exam.date + 'T00:00:00');
  d.setHours(SESSION_TIMES[exam.session], 0, 0, 0);
  return d;
}

function formatDate(dateStr) {
  const d = new Date(dateStr + 'T12:00:00');
  return d.toLocaleDateString('en-GB', { weekday:'short', day:'numeric', month:'long' });
}

function pad(n){ return String(Math.max(0,n)).padStart(2,'0'); }

function getCountdown(examDt) {
  const now = Date.now();
  const diff = examDt - now;
  if (diff <= 0) return null;
  const totalSecs = Math.floor(diff / 1000);
  const days  = Math.floor(totalSecs / 86400);
  const hours = Math.floor((totalSecs % 86400) / 3600);
  const mins  = Math.floor((totalSecs % 3600) / 60);
  const secs  = totalSecs % 60;
  return { days, hours, mins, secs, diff };
}

function renderGrid(filter) {
  const grid = document.getElementById('exams-grid');
  grid.innerHTML = '';
  const now = Date.now();

  let nextExam = null;
  EXAMS.forEach(e => {
    const dt = getExamDateTime(e);
    if (dt > now && (!nextExam || dt < getExamDateTime(nextExam))) nextExam = e;
  });

  let breakIdx = 0;

  EXAMS.forEach((exam) => {
    const dt = getExamDateTime(exam);
    const isPast = dt <= now;
    const isNext = nextExam && exam.id === nextExam.id;

    // Insert break banners
    while (breakIdx < BREAKS.length) {
      const brk = BREAKS[breakIdx];
      const breakAfterDt = new Date(brk.afterDate + 'T23:59:59');
      if (!isPast && dt > breakAfterDt) {
        if (filter === 'all' || filter === 'upcoming') {
          const breakEl = document.createElement('div');
          breakEl.className = 'break-banner';
          breakEl.innerHTML = '<h3>\uD83C\uDFD6 '+brk.label+'</h3><p>'+brk.desc+'</p>';
          grid.appendChild(breakEl);
        }
        breakIdx++;
      } else { break; }
    }

    if (filter === 'past' && !isPast) return;
    if (filter === 'upcoming' && isPast) return;

    const card = document.createElement('div');
    card.className = 'exam-card' + (isPast ? ' past' : '') + (isNext ? ' next-up' : '');
    card.style.setProperty('--card-accent', exam.color);
    card.dataset.examId = exam.id;

    const sessionClass = exam.session === 'Morning' ? 'session-morning' : 'session-afternoon';
    const sessionIcon = exam.session === 'Morning'
      ? '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/></svg>'
      : '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>';

    let tickerHTML;
    if (isPast) {
      tickerHTML = '<div class="ticker"><div class="ticker-label">Status</div><div class="past-label">\u2713 Completed</div></div>';
    } else {
      const cd = getCountdown(dt);
      tickerHTML = '<div class="ticker" id="ticker-'+exam.id+'"><div class="ticker-label">Time remaining</div><div class="ticker-time"><div class="unit"><span class="num" id="d-'+exam.id+'">'+pad(cd.days)+'</span><span class="lbl">days</span></div><span class="ticker-sep">:</span><div class="unit"><span class="num" id="h-'+exam.id+'">'+pad(cd.hours)+'</span><span class="lbl">hrs</span></div><span class="ticker-sep">:</span><div class="unit"><span class="num" id="m-'+exam.id+'">'+pad(cd.mins)+'</span><span class="lbl">min</span></div><span class="ticker-sep">:</span><div class="unit"><span class="num" id="s-'+exam.id+'">'+pad(cd.secs)+'</span><span class="lbl">sec</span></div></div></div>';
    }

    card.innerHTML = '<div class="card-header"><div class="subject-name">'+exam.subject+' <span style="font-weight:400;color:var(--color-text-muted)">'+exam.paper+'</span></div><span class="session-badge '+sessionClass+'">'+sessionIcon+' '+exam.session+'</span></div><div class="exam-date"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>'+formatDate(exam.date)+'</div>'+tickerHTML;

    grid.appendChild(card);
  });

  updateProgress();
  updateNextLabel(nextExam);
}

function updateProgress() {
  const now = Date.now();
  const done = EXAMS.filter(e => getExamDateTime(e) <= now).length;
  const pct = Math.round((done / EXAMS.length) * 100);
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-text').textContent = done + ' / ' + EXAMS.length + ' completed';
}

function updateNextLabel(nextExam) {
  const el = document.getElementById('next-label');
  if (!nextExam) { el.textContent = '\uD83C\uDF89 All exams done!'; return; }
  const dt = getExamDateTime(nextExam);
  const days = Math.floor((dt - Date.now()) / 86400000);
  el.textContent = days === 0
    ? 'Today: ' + nextExam.subject + ' ' + nextExam.paper
    : 'Next up in ' + days + ' day' + (days===1?'':'s') + ': ' + nextExam.subject + ' ' + nextExam.paper;
}

let prevVals = {};
function tick() {
  EXAMS.forEach(exam => {
    const dt = getExamDateTime(exam);
    if (dt <= Date.now()) return;
    const cd = getCountdown(dt);
    if (!cd) return;
    ['d','h','m','s'].forEach((key, i) => {
      const val = [cd.days, cd.hours, cd.mins, cd.secs][i];
      const el = document.getElementById(key + '-' + exam.id);
      if (!el) return;
      const pkey = exam.id + '-' + key;
      if (prevVals[pkey] !== val) {
        el.classList.add('flip');
        setTimeout(() => { el.textContent = pad(val); el.classList.remove('flip'); }, 150);
        prevVals[pkey] = val;
      }
    });
  });
  const now2 = new Date();
  document.getElementById('live-clock').textContent = now2.toLocaleTimeString('en-GB', { hour12:false });
  const nextExam = EXAMS.reduce((acc, e) => {
    const dt = getExamDateTime(e);
    if (dt <= Date.now()) return acc;
    if (!acc || dt < getExamDateTime(acc)) return e;
    return acc;
  }, null);
  updateNextLabel(nextExam);
}

document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderGrid(btn.dataset.filter);
  });
});

(function(){
  const t = document.querySelector('[data-theme-toggle]');
  const r = document.documentElement;
  let d = r.getAttribute('data-theme') || (matchMedia('(prefers-color-scheme:dark)').matches ? 'dark' : 'light');
  r.setAttribute('data-theme', d);
  function updateIcon(){
    t.innerHTML = d === 'dark'
      ? '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>'
      : '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>';
  }
  updateIcon();
  t.addEventListener('click', () => { d = d === 'dark' ? 'light' : 'dark'; r.setAttribute('data-theme', d); updateIcon(); });
})();

renderGrid('all');
setInterval(tick, 1000);
tick();
</script>
</body>
